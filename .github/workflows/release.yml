name: release

on:
  push:
    tags:
      # Semver tags without 'v' prefix: 0.6.2, 1.2.3, 0.6.2-rc.1
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read
  packages: write
  id-token: write      # for cosign keyless signing (later)
  attestations: write  # for build provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Cargo.toml version ($CARGO_VERSION) != git tag ($TAG_VERSION)" >&2
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # amd64-only: fleet-dns deploys on hr-home.xyz/stable nodes, which are
      # all amd64 (hr-main, media-tv). QEMU-emulated arm64 kube + axum builds
      # take 30+ min and were timing out, for zero benefit.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ env.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
