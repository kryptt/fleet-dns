name: release

on:
  push:
    tags:
      # Semver tags without 'v' prefix: 0.6.2, 1.2.3, 0.6.2-rc.1
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read
  packages: write
  id-token: write      # for cosign keyless signing (later)
  attestations: write  # for build provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Cargo.toml version ($CARGO_VERSION) != git tag ($TAG_VERSION)" >&2
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-arch: hr-home.xyz/stable selector now covers hr-op7/hr-op8
      # (arm64 OpenELA boxes) in addition to amd64 hosts. The Dockerfile
      # uses locked cache mounts (sharing=locked) so parallel amd64/arm64
      # builds can share the cargo registry without `File exists` clashes.
      # QEMU-emulated arm64 + axum compile takes ~25 min; budget 60.
      - name: Build and push image
        uses: docker/build-push-action@v6
        timeout-minutes: 60
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ env.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
